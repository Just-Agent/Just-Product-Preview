name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:json
      - run: pnpm release:check
      - run: pnpm release:checklist
      - run: pnpm exec playwright install chromium ffmpeg
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm just-preview doctor
      - run: pnpm just-preview validate --config just-preview.config.example.json recipes/landing-page.json
      - run: pnpm just-preview plan video --config just-preview.config.example.json --manifest outputs/ci-video-plan.json
      - run: pnpm smoke:publish
      - run: pnpm smoke:action-inputs
      - run: pnpm smoke:local-html
