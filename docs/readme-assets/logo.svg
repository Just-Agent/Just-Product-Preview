<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Just-Product-Preview logo</title>
  <desc id="desc">A compact preview toolkit mark with a browser window, play frame, capture path, and artifact tiles.</desc>
  <defs>
    <linearGradient id="bg" x1="64" x2="448" y1="64" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="play" x1="316" x2="422" y1="144" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="path" x1="136" x2="382" y1="302" y2="302" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="42" y="42" width="428" height="428" rx="108" fill="url(#bg)"/>
  <circle cx="396" cy="120" r="44" fill="#38bdf8" opacity="0.14"/>
  <circle cx="124" cy="386" r="58" fill="#22c55e" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="92" y="112" width="216" height="178" rx="34" fill="#0f172a"/>
    <rect x="92" y="112" width="216" height="44" rx="34" fill="#1e293b"/>
    <circle cx="122" cy="134" r="7" fill="#f97316"/>
    <circle cx="146" cy="134" r="7" fill="#facc15"/>
    <circle cx="170" cy="134" r="7" fill="#22c55e"/>
    <path d="M128 202l28 22-28 22" fill="none" stroke="#38bdf8" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="178" y="215" width="86" height="14" rx="7" fill="#22c55e"/>
    <rect x="126" y="258" width="74" height="10" rx="5" fill="#64748b"/>
    <rect x="214" y="258" width="52" height="10" rx="5" fill="#64748b"/>
  </g>

  <path d="M308 202h28" fill="none" stroke="#2563eb" stroke-width="12" stroke-linecap="round"/>

