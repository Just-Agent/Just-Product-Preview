  <g filter="url(#shadow)">
    <rect x="110" y="334" width="58" height="48" rx="16" fill="#ecfeff" stroke="#38bdf8" stroke-width="6"/>
    <rect x="196" y="352" width="58" height="48" rx="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="6"/>
    <rect x="282" y="334" width="58" height="48" rx="16" fill="#faf5ff" stroke="#9333ea" stroke-width="6"/>
    <rect x="368" y="352" width="58" height="48" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="6"/>
