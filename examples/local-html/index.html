<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Just-Preview Local HTML Example</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 48px; background: #f7f7f8; }
      main { max-width: 880px; margin: 0 auto; background: white; padding: 48px; border-radius: 24px; }
      h1 { font-size: 56px; line-height: 1; margin: 0 0 24px; }
      p { font-size: 22px; line-height: 1.5; color: #444; }
      button { font-size: 18px; padding: 14px 20px; border-radius: 999px; border: 0; background: black; color: white; }
    </style>
  </head>
  <body>
    <main>
      <h1>Preview what your Agent built.</h1>
      <p>Just-Preview turns HTML, URLs, and local apps into thumbnails and videos.</p>
      <button data-preview="demo-button">Demo Button</button>
    </main>
  </body>
</html>
