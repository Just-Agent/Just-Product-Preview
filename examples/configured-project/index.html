<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Configured Just-Preview Demo</title>
    <style>
      body { margin: 0; min-height: 140vh; font-family: Inter, system-ui, sans-serif; background: radial-gradient(circle at top left, #1d4ed8, #0f172a 45%, #020617); color: white; }
      main { max-width: 960px; margin: 0 auto; padding: 72px 24px; }
      .hero { border: 1px solid rgba(255,255,255,.14); border-radius: 32px; padding: 56px; background: rgba(15,23,42,.72); box-shadow: 0 28px 80px rgba(0,0,0,.38); }
      h1 { font-size: clamp(44px, 8vw, 88px); letter-spacing: -0.07em; line-height: .92; margin: 0 0 24px; }
      p { color: #dbeafe; font-size: 20px; line-height: 1.7; max-width: 720px; }
      button { margin-top: 28px; padding: 16px 24px; border: 0; border-radius: 16px; background: #bfdbfe; color: #0f172a; font-weight: 900; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 64px; }
      .card { min-height: 120px; border-radius: 24px; padding: 20px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); }
      @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } .hero { padding: 32px; } }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Configured previews that feel like a product.</h1>
        <p>Keep defaults in just-preview.config.json, override details from the CLI, and generate repeatable preview assets for README and PR reviews.</p>
        <button data-preview="demo-button" onclick="this.textContent='Preview generated ✨'">Generate configured preview</button>
        <div class="grid">
          <div class="card">Config-first CLI</div>
          <div class="card">Agent-ready recipes</div>
          <div class="card">Shareable artifacts</div>
        </div>
      </section>
    </main>
  </body>
</html>
